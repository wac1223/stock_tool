name: stock-bot

on:
  schedule:
    - cron: "0 3,7,11,15,19,23 * * *" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # push の衝突を防ぐ

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock bot
        env:
              LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
              USER_ID: ${{ secrets.USER_ID }}
              GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
              echo "=== Running stock bot ==="
              python main.py

      - name: Commit & Push asset history
        run: |
          echo "=== Commit changes ==="
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "auto update history" || exit 0

          echo "=== Push changes ==="
          git pull --rebase
          git push
